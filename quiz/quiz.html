<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Проверка знаний - Уроки Python</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Проверка знаний</h1>
            <p id="student-info"></p>
            <p id="experience-display">Опыт: 0</p>
        </header>

        <main id="test-content">
            <!-- Здесь будут задания -->
        </main>

        <div class="actions">
            <button id="finish-test" disabled>Завершить тест</button>
        </div>

        <!-- Консоль для вывода результатов кода -->
        <div class="console-panel">
            <h3>Вывод программы:</h3>
            <pre id="console-output"></pre>
        </div>
    </div>

    <!-- Модальное окно для отображения итога -->
    <div id="result-modal" class="modal">
        <div class="modal-content">
            <h2>Результат теста</h2>
            <p id="result-text"></p>
            <button id="close-modal">Закрыть</button>
        </div>
    </div>

    <script src="test.js"></script>
</body>
</html>
